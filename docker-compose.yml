services:
  db:
    image: postgres:15-alpine
    container_name: cuan-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cuan
    ports:
      - '5433:5432'
    volumes:
      - cuan_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cuan_pg_data:
