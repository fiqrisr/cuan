# https://moonrepo.dev/docs/config/project
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'
stack: 'backend'

project:
  name: 'core'
  description: 'Cuan backend API powered by Elysia.js'

tasks:
  dev:
    command: 'bun run --watch src/index.ts'
    preset: server

  build:
    command: 'bun build src/index.ts --outdir dist --target bun'
    inputs:
      - 'src/**/*'
    outputs:
      - 'dist'

  test:
    command: 'bash scripts/test-with-db.sh'
    env:
      OPENMODEL_BASE_URL: 'http://localhost:3999'
    inputs:
      - 'src/**/*'
      - 'scripts/test-with-db.sh'

  'db-reset':
    command: 'bash scripts/reset-dev-db.sh'
    preset: server

  'db-generate-auth':
    command: 'better-auth generate'

  'db-migrate':
    command: 'drizzle-kit migrate'
    preset: server

  'db-push':
    command: 'drizzle-kit push'
    preset: server
