# https://moonrepo.dev/docs/config/workspace
$schema: 'https://moonrepo.dev/schemas/workspace.json'

# Require a specific version of moon while running commands, otherwise fail.
versionConstraint: '>=2.0.0'

# REQUIRED: A map or list of all projects found within the workspace.
# Cuan uses root-level directories for its applications instead of the
# conventional apps/* layout.
projects:
  core: 'core'
  web: 'web'
  ui: 'packages/ui'

vcs:
  client: 'git'
  defaultBranch: 'main'
  sync: true
