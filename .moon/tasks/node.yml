# https://moonrepo.dev/docs/config/tasks
$schema: 'https://moonrepo.dev/schemas/tasks.json'

# Inherit these tasks by all projects using the JavaScript/TypeScript toolchains.
inheritedBy:
  toolchains:
    or: ['javascript', 'typescript']

# Shared tasks for Node-based tooling. Commands run from the inheriting project root.
tasks:
  format:
    command: 'biome format --write .'
    toolchains: ['javascript', 'node']
    options:
      runInCI: false

  format-check:
    command: 'biome format .'
    toolchains: ['javascript', 'node']

  lint:
    command: 'biome lint .'
    toolchains: ['javascript', 'node']

  check:
    command: 'biome check .'
    toolchains: ['javascript', 'node']

  check-write:
    command: 'biome check --write .'
    toolchains: ['javascript', 'node']
    options:
      runInCI: false

  typecheck:
    command: 'tsc --noEmit'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'

