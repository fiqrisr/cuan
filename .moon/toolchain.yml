# https://moonrepo.dev/docs/config/toolchain
$schema: 'https://moonrepo.dev/schemas/toolchain.json'

# Use Bun as the package manager and runtime for the entire workspace.
bun:
  version: '1.3.14'
  dependencyVersionFormat: 'workspace'
  syncProjectWorkspaceDependencies: true

# Default Node.js settings for tools that require a Node binary path.
node:
  version: '22.12.0'
  packageManager: 'bun'
  addEnginesConstraint: false
  syncPackageManagerField: false

# TypeScript support: ensures moon can resolve project references if needed.
typescript:
  createMissingConfig: false
  projectConfigFileName: 'tsconfig.json'
  rootConfigFileName: 'tsconfig.json'
  routeOutDirToCache: false
  syncProjectReferences: true
  syncProjectReferencesToPaths: true
